version: '3.8'

networks:
  devsecops-net:
    driver: bridge

services:
  # GÜVENLİK MERKEZİ: SonarQube
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    networks:
      - devsecops-net
    volumes:
      - sonarqube_data:/opt/sonarqube/data

  # ORKESTRA ŞEFİ: Jenkins
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    networks:
      - devsecops-net
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Jenkins'in Docker içinde Docker çalıştırması için kritik!

volumes:
  sonarqube_data:
  jenkins_home: